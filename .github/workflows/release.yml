name: Release Arkenar GUI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # v1.0.1, v1.0.1-beta, v1.1.0-rc1, etc.

permissions:
  contents: write   # required to create/update GitHub Releases

jobs:
  build-tauri:
    name: Build GUI — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # a Windows failure won't cancel the Linux build
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: gui
        run: pnpm install --frozen-lockfile

      # ── Linux system libraries (Tauri v2 requires webkit2gtk 4.1) ─────────
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Build Tauri app and publish to GitHub Release ─────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "Arkenar ${{ github.ref_name }}"
          releaseBody: |
            ## Arkenar ${{ github.ref_name }}

            ### Downloads
            | Platform | Installer |
            |----------|-----------|
            | Windows  | `Arkenar_*_x64-setup.exe` (NSIS, no admin required) |
            | Linux    | `arkenar_*_amd64.AppImage` · `arkenar_*_amd64.deb` |

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          # Automatically mark as pre-release when the tag contains -beta or -rc
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}